name: Build & Release — The Hollows

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1-stable"
  EXPORT_NAME:   "TheHollows"
  PROJECT_PATH:  "game"

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            ~/.local/share/godot/export_templates
            /usr/local/bin/godot
          key: godot-4.6.1-stable

      - name: Install Godot + Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable"
          wget -q "$BASE/Godot_v4.6.1-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v4.6.1-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          wget -q "$BASE/Godot_v4.6.1-stable_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.6.1.stable/
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.6.1.stable/

      - name: Import project
        run: |
          cd ${{ env.PROJECT_PATH }}
          godot --headless --import 2>&1 | tail -5 || true

      - name: Export Windows EXE
        run: |
          mkdir -p ${{ env.PROJECT_PATH }}/build
          cd ${{ env.PROJECT_PATH }}
          godot --headless --export-release "Windows Desktop" build/${{ env.EXPORT_NAME }}.exe

      - name: Zip build
        run: |
          cd ${{ env.PROJECT_PATH }}/build
          zip -r ../../${{ env.EXPORT_NAME }}-Windows-x64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Windows-x64
          path: ${{ env.EXPORT_NAME }}-Windows-x64.zip
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "The Hollows ${{ github.ref_name }}"
          body: |
            ## The Hollows ${{ github.ref_name }}
            הורד את הZIP, חלץ, הרץ TheHollows.exe
          files: ${{ env.EXPORT_NAME }}-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
