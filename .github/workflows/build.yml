name: Build & Release — The Hollows

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1-stable"
  EXPORT_NAME:   "TheHollows"
  PROJECT_PATH:  "game"

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, lfs: true }

      - name: Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            ~/.local/share/godot/export_templates
            /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_VERSION }}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}_export_templates.tpz" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}/
          unzip -q templates.tpz && mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}/

      - name: Import + Export
        run: |
          mkdir -p ${{ env.PROJECT_PATH }}/build
          cd ${{ env.PROJECT_PATH }}
          godot --headless --import || true
          godot --headless --export-release "Windows Desktop" build/${{ env.EXPORT_NAME }}.exe

      - name: Zip + Release
        run: cd ${{ env.PROJECT_PATH }}/build && zip -r ../../${{ env.EXPORT_NAME }}-Windows.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Windows
          path: ${{ env.EXPORT_NAME }}-Windows.zip

      - name: GitHub Release  # רק על tag כמו v1.0.0
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.EXPORT_NAME }}-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
